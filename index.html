<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carousel Media — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#07090F;--surface:#0D1120;--surface2:#121829;--surface3:#18203A;
      --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
      --text:#EEF2FF;--text2:#7B88A8;--text3:#3D4A6B;
      --accent:#FF6B35;--indigo:#6366F1;--indigo2:#818CF8;
      --green:#0FD99C;--yellow:#F5C842;--red:#FF4060;--pink:#F472B6;--blue:#38BDF8;
      --google-red:#EA4335;--sidebar:200px;
    }
    body{margin:0;background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text);}
    #root{min-height:100vh;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}
    input,button,select{font-family:'DM Sans',sans-serif;}
    input[type="text"],input[type="password"],input[type="number"],input[type="date"]{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;outline:none;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,0.12);}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ═══════════════════════════════════════════════
// CONFIG — Edit this section
// ═══════════════════════════════════════════════
const ANTHROPIC_KEY="PASTE_YOUR_ANTHROPIC_KEY_HERE";

// Logins: role "agency" = all clients, role "client" = own data only
const USERS=[
  {username:"carousel_admin",password:"ChangeMe123!",role:"agency",clientId:null},
  {username:"demo_client",   password:"Demo@2025",   role:"client",clientId:"demo"},
];

// Client registry — add one entry per client
const CLIENTS=[
  {
    id:"demo",name:"Demo Brand",initials:"DB",color:"#FF6B35",cacTarget:250,
    platforms:["meta","shopify"],
    metaFiles:{d7:"data_7d.json",d28:"data_28d.json",month:"data_month.json"},
    googleFiles:{d7:"google_7d.json",d28:"google_28d.json",month:"google_month.json"},
  },
  // Copy this block for each new client:
  // {
  //   id:"client2",name:"Brand Name",initials:"BN",color:"#0FD99C",cacTarget:300,
  //   platforms:["meta","shopify","google"],
  //   metaFiles:{
  //     d7:"https://raw.githubusercontent.com/ORG/REPO/main/data_7d.json",
  //     d28:"https://raw.githubusercontent.com/ORG/REPO/main/data_28d.json",
  //     month:"https://raw.githubusercontent.com/ORG/REPO/main/data_month.json",
  //   },
  //   googleFiles:{
  //     d7:"https://raw.githubusercontent.com/ORG/REPO/main/google_7d.json",
  //     d28:"https://raw.githubusercontent.com/ORG/REPO/main/google_28d.json",
  //     month:"https://raw.githubusercontent.com/ORG/REPO/main/google_month.json",
  //   },
  // },
];

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const fmt=(n,d=0)=>Number(n||0).toLocaleString("en-IN",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtK=n=>n>=10000000?(n/10000000).toFixed(1)+"Cr":n>=100000?(n/100000).toFixed(1)+"L":n>=1000?(n/1000).toFixed(1)+"K":String(Math.round(n||0));
const rupee=n=>"₹"+fmt(n);
const DATE_RANGES=[{label:"7 Days",value:"last_7d",fileKey:"d7"},{label:"28 Days",value:"last_28d",fileKey:"d28"},{label:"Month",value:"this_month",fileKey:"month"}];
const META_TABS=["Overview","Campaigns","Ad Sets","Creatives","Funnels","Audiences","Placements","Geography","Heatmap","Pacing"];
const GOOGLE_TABS=["G — Overview","G — Campaigns","G — Ad Groups","G — Keywords","G — Devices","G — Geography"];
const EXTRA_TABS=["RTO Analysis","✨ AI Strategy"];
const CB={background:"rgba(255,255,255,0.025)",border:"1px solid var(--border)",borderRadius:14,padding:"18px 20px",marginBottom:14};
const ROW={borderBottom:"1px solid rgba(255,255,255,0.04)"};
const HOV={onMouseEnter:e=>e.currentTarget.style.background="rgba(255,255,255,0.03)",onMouseLeave:e=>e.currentTarget.style.background="transparent"};

// ═══════════════════════════════════════════════
// UI ATOMS
// ═══════════════════════════════════════════════
function Spin({s=18,c="var(--accent)"}){return <div style={{width:s,height:s,border:"2px solid rgba(255,107,53,0.15)",borderTopColor:c,borderRadius:"50%",animation:"spin 0.75s linear infinite",flexShrink:0}}/>;}

function Badge({status}){
  const on=["ACTIVE","ENABLED"].includes(status);
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20,background:on?"rgba(15,217,156,0.1)":"rgba(61,74,107,0.2)",color:on?"var(--green)":"var(--text3)"}}>
    <span style={{width:5,height:5,borderRadius:"50%",background:on?"var(--green)":"var(--text3)",display:"inline-block"}}/>{status}
  </span>;
}

function KPI({label,value,sub,color,warn,hi}){
  return <div style={{background:warn?"rgba(255,64,96,0.05)":hi?"rgba(255,107,53,0.04)":"rgba(255,255,255,0.02)",border:`1px solid ${warn?"rgba(255,64,96,0.22)":hi?"rgba(255,107,53,0.16)":"var(--border)"}`,borderRadius:12,padding:"14px 16px",animation:"fadeIn 0.3s ease"}}>
    <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.08em",color:"var(--text3)",textTransform:"uppercase",marginBottom:5}}>{label}</div>
    <div style={{fontSize:22,fontWeight:700,color:warn?"var(--red)":color||"var(--text)",lineHeight:1.1,fontVariantNumeric:"tabular-nums"}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:"var(--text2)",marginTop:4,lineHeight:1.4}}>{sub}</div>}
  </div>;
}

function TH({cols}){return <thead><tr>{cols.map(c=><th key={c} style={{textAlign:"left",padding:"8px 12px",color:"var(--text3)",fontWeight:600,fontSize:10,letterSpacing:"0.06em",textTransform:"uppercase",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{c}</th>)}</tr></thead>;}

function CAC({cac,t=250}){const ok=cac>0&&cac<=t,cl=cac>t&&cac<=t*1.5,c=cac===0?"var(--text3)":ok?"var(--green)":cl?"var(--yellow)":"var(--red)";return <span style={{fontWeight:700,color:c}}>{cac>0?rupee(cac):"—"}</span>;}
function ROAS({roas}){const c=roas>=3?"var(--green)":roas>=1.5?"var(--yellow)":"var(--red)";return <span style={{fontWeight:700,color:c}}>{roas||0}x</span>;}
function Freq({freq}){const c=freq>=4?"var(--red)":freq>=2.5?"var(--yellow)":"var(--green)";return <span style={{fontWeight:600,color:c,fontSize:12}}>{freq||"—"}{freq>=4&&" 🔥"}</span>;}

// ═══════════════════════════════════════════════
// CHARTS
// ═══════════════════════════════════════════════
function LineChart({data,yKey,y2Key,yLabel,y2Label,yColor,y2Color,goal,h=200}){
  const ref=useRef(null),cr=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data?.length)return;
    if(cr.current)cr.current.destroy();
    const ds=[{label:yLabel||yKey,data:data.map(d=>d[yKey]||0),fill:true,tension:0.4,borderColor:yColor||"#6366F1",borderWidth:2,backgroundColor:(yColor||"#6366F1")+"18",pointRadius:2.5,pointBackgroundColor:yColor||"#6366F1",yAxisID:"y"}];
    if(y2Key)ds.push({label:y2Label||y2Key,data:data.map(d=>d[y2Key]||0),fill:false,tension:0.4,borderColor:y2Color||"#0FD99C",borderWidth:2,pointRadius:2.5,pointBackgroundColor:y2Color||"#0FD99C",yAxisID:"y1"});
    const plugins={legend:{display:false}};
    if(goal)plugins.annotation={annotations:{g:{type:"line",yMin:goal,yMax:goal,borderColor:"#FF4060",borderWidth:1.5,borderDash:[5,4]}}};
    cr.current=new Chart(ref.current.getContext("2d"),{type:"line",data:{labels:data.map(d=>d.day||d.date||""),datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins,scales:{x:{grid:{display:false},ticks:{color:"#3D4A6B",font:{size:10},maxRotation:0}},y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#3D4A6B",font:{size:10},callback:v=>yKey==="cac"||yKey==="spend"||yKey==="revenue"?"₹"+v:v},position:"left"},...(y2Key?{y1:{grid:{display:false},ticks:{color:y2Color||"#0FD99C",font:{size:10}},position:"right"}}:{})}}});
    return()=>{if(cr.current)cr.current.destroy();};
  },[data,yKey,y2Key,goal]);
  return <div style={{position:"relative",width:"100%",height:h}}><canvas ref={ref}/></div>;
}

function BarChart({data,xKey,yKey,color,h=160}){
  const ref=useRef(null),cr=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data?.length)return;
    if(cr.current)cr.current.destroy();
    cr.current=new Chart(ref.current.getContext("2d"),{type:"bar",data:{labels:data.map(d=>d[xKey]||""),datasets:[{data:data.map(d=>d[yKey]||0),backgroundColor:(color||"#6366F1")+"40",borderColor:color||"#6366F1",borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:"#3D4A6B",font:{size:10}}},y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#3D4A6B",font:{size:10}}}}}});
    return()=>{if(cr.current)cr.current.destroy();};
  },[data]);
  return <div style={{position:"relative",width:"100%",height:h}}><canvas ref={ref}/></div>;
}

// ═══════════════════════════════════════════════
// FUNNEL
// ═══════════════════════════════════════════════
function Funnel({f}){
  const stages=[
    {l:"Reach",v:f.reach||0,c:"#6366F1"},
    {l:"Impressions",v:f.impressions||0,c:"#818CF8"},
    {l:"Link Clicks",v:f.link_clicks||f.clicks||0,c:"var(--blue)",drop:f.dropoffs?.impressions_to_link_clicks||f.dropoffs?.impressions_to_clicks},
    {l:"Landing",v:f.landing_views||0,c:"var(--green)",drop:f.dropoffs?.link_clicks_to_landing||f.dropoffs?.clicks_to_landing},
    {l:"Add to Cart",v:f.add_to_cart||0,c:"var(--yellow)",drop:f.dropoffs?.landing_to_cart},
    {l:"Purchases",v:f.purchases||f.conversions||0,c:"var(--pink)",drop:f.dropoffs?.cart_to_purchase},
  ];
  const top=stages[0].v||1;
  const worst=(stages.filter(s=>s.drop!=null)).reduce((a,b)=>(!a||b.drop<a.drop)?b:a,null);
  return <div style={{padding:"8px 0"}}>{stages.map((s,i)=>{
    const w=Math.max((s.v/top)*100,3),isW=worst&&s.l===worst.l;
    return <div key={s.l}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:90,textAlign:"right",fontSize:11,color:isW?"var(--yellow)":"var(--text2)",fontWeight:isW?600:400,flexShrink:0}}>{s.l}{isW?" ⚠":""}</div>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,height:24}}><div style={{height:"100%",width:w+"%",background:s.c,borderRadius:4,opacity:0.8,clipPath:"polygon(0 0,calc(100% - 5px) 0,100% 50%,calc(100% - 5px) 100%,0 100%)",transition:"width 0.5s ease"}}/></div>
          <div style={{width:60,textAlign:"right",fontSize:12,fontWeight:700,color:"var(--text)",flexShrink:0}}>{fmtK(s.v)}</div>
        </div>
      </div>
      {s.drop!=null&&i<stages.length-1&&<div style={{display:"flex",alignItems:"center",gap:10,margin:"1px 0"}}>
        <div style={{width:90,flexShrink:0}}/>
        <div style={{flex:1,paddingLeft:4,display:"flex",alignItems:"center",gap:5}}>
          <span style={{fontSize:9,color:"var(--text3)"}}>↓</span>
          <span style={{fontSize:10,fontWeight:600,color:s.drop<30?"var(--red)":s.drop<60?"var(--yellow)":"var(--green)",background:s.drop<30?"rgba(255,64,96,0.1)":s.drop<60?"rgba(245,200,66,0.1)":"rgba(15,217,156,0.1)",padding:"1px 7px",borderRadius:10}}>{s.drop}% pass · {(100-s.drop).toFixed(1)}% drop</span>
        </div>
      </div>}
    </div>;
  })}</div>;
}

// ═══════════════════════════════════════════════
// HEATMAP
// ═══════════════════════════════════════════════
function Heatmap({data}){
  if(!data?.length)return <div style={{color:"var(--text3)",fontSize:12,padding:"20px 0"}}>No hourly data</div>;
  const mS=Math.max(...data.map(d=>d.spend||0),1),mP=Math.max(...data.map(d=>d.purchases||0),1);
  return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:5,marginBottom:14}}>
      {data.map(h=><div key={h.hour} style={{textAlign:"center"}}>
        <div style={{fontSize:9,color:"var(--text3)",marginBottom:3}}>{h.hour}h</div>
        <div style={{height:40,background:`rgba(99,102,241,${0.07+(h.spend/mS)*0.88})`,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"var(--indigo2)",fontWeight:600}}>{h.spend>0?rupee(Math.round(h.spend)):""}</div>
        <div style={{height:20,background:`rgba(15,217,156,${0.07+(h.purchases/mP)*0.88})`,borderRadius:6,marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"var(--green)",fontWeight:600}}>{h.purchases>0?h.purchases+"p":""}</div>
      </div>)}
    </div>
    <div style={{display:"flex",gap:16,fontSize:11,color:"var(--text2)"}}>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:11,height:11,background:"rgba(99,102,241,0.6)",borderRadius:3,display:"inline-block"}}/>Spend</span>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:11,height:11,background:"rgba(15,217,156,0.6)",borderRadius:3,display:"inline-block"}}/>Purchases</span>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════
// CLAUDE API
// ═══════════════════════════════════════════════
async function claude(prompt){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);return d.content[0].text;
}

// ═══════════════════════════════════════════════
// RTO TAB
// ═══════════════════════════════════════════════
function RTOTab({clientName}){
  const [rows,setRows]=useState([]),[dragging,setDragging]=useState(false),[file,setFile]=useState(""),ref=useRef(null);
  const parse=txt=>{const lines=txt.trim().split("\n");if(lines.length<2)return[];const hdrs=lines[0].split(",").map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,"_"));return lines.slice(1).map(l=>{const v=l.split(",").map(x=>x.trim().replace(/^"|"$/g,""));const o={};hdrs.forEach((h,i)=>o[h]=v[i]||"");return o;}).filter(r=>Object.values(r).some(v=>v));};
  const load=f=>{if(!f||!f.name.endsWith(".csv"))return alert("Please upload a CSV file");setFile(f.name);const rd=new FileReader();rd.onload=e=>setRows(parse(e.target.result));rd.readAsText(f);};
  const total=rows.length;
  const revLost=rows.reduce((s,r)=>s+(parseFloat((r.amount||r.order_amount||r.total||"0").replace(/[^0-9.]/g,""))||0),0);
  const avg=total>0?revLost/total:0;
  const prodMap={};rows.forEach(r=>{const p=r.product||r.product_name||r.item||"Unknown";const a=parseFloat((r.amount||r.order_amount||r.total||"0").replace(/[^0-9.]/g,""))||0;if(!prodMap[p])prodMap[p]={product:p,orders:0,revenue:0};prodMap[p].orders++;prodMap[p].revenue+=a;});
  const prods=Object.values(prodMap).sort((a,b)=>b.orders-a.orders).slice(0,15);

  if(!rows.length)return <div>
    <div style={{...CB,marginBottom:14}}><div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:4}}>📦 RTO Analysis — {clientName}</div><div style={{fontSize:11,color:"var(--text2)"}}>Upload your month-end RTO CSV. Expected columns: Order ID, Product, Amount</div></div>
    <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);load(e.dataTransfer.files[0]);}} onClick={()=>ref.current.click()} style={{border:`2px dashed ${dragging?"var(--accent)":"var(--border2)"}`,borderRadius:16,padding:"60px 20px",textAlign:"center",cursor:"pointer",background:dragging?"rgba(255,107,53,0.05)":"rgba(255,255,255,0.01)",transition:"all 0.2s"}}>
      <div style={{fontSize:36,marginBottom:14}}>📂</div>
      <div style={{fontSize:15,fontWeight:700,color:"var(--text)",marginBottom:6}}>Drop your RTO CSV here</div>
      <div style={{fontSize:12,color:"var(--text2)",marginBottom:16}}>or click to browse</div>
      <div style={{display:"inline-block",padding:"8px 20px",background:"rgba(255,107,53,0.15)",color:"var(--accent)",borderRadius:8,fontWeight:600,fontSize:12,border:"1px solid rgba(255,107,53,0.3)"}}>Choose CSV File</div>
      <div style={{fontSize:11,color:"var(--text3)",marginTop:14}}>Columns: Order ID · Product · Amount</div>
      <input ref={ref} type="file" accept=".csv" style={{display:"none"}} onChange={e=>load(e.target.files[0])}/>
    </div>
  </div>;

  return <div style={{animation:"fadeIn 0.3s ease"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div><div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>📦 RTO Analysis — {clientName}</div><div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>File: {file} · {total} returned orders</div></div>
      <button onClick={()=>{setRows([]);setFile("");}} style={{fontSize:11,padding:"6px 14px",cursor:"pointer",borderRadius:8,background:"rgba(255,64,96,0.1)",color:"var(--red)",border:"1px solid rgba(255,64,96,0.2)",fontWeight:600}}>✕ Clear</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
      <KPI label="Total RTO Orders" value={fmt(total)} sub="Returned this month" color="var(--red)"/>
      <KPI label="Revenue Lost" value={rupee(revLost)} sub="Total value of returns" color="var(--yellow)"/>
      <KPI label="Avg Return Value" value={rupee(avg)} sub="Per returned order" color="var(--text2)"/>
    </div>
    <div style={CB}>
      <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14}}>📦 Product-wise Returns</div>
      {prods.length>0?<>
        <BarChart data={prods.slice(0,10)} xKey="product" yKey="orders" color="#FF4060" h={150}/>
        <div style={{overflowX:"auto",marginTop:14}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <TH cols={["Product","RTO Orders","Revenue Lost","Avg Value","% of Total"]}/>
            <tbody>{prods.map((p,i)=><tr key={i} style={ROW} {...HOV}>
              <td style={{padding:"9px 12px",color:"var(--text)",fontWeight:500}}>{p.product}</td>
              <td style={{padding:"9px 12px",color:"var(--red)",fontWeight:700}}>{p.orders}</td>
              <td style={{padding:"9px 12px",color:"var(--yellow)",fontWeight:600}}>{rupee(p.revenue)}</td>
              <td style={{padding:"9px 12px",color:"var(--text2)"}}>{rupee(p.orders>0?p.revenue/p.orders:0)}</td>
              <td style={{padding:"9px 12px",color:"var(--text2)"}}>{total>0?((p.orders/total)*100).toFixed(1):0}%</td>
            </tr>)}</tbody>
          </table>
        </div>
      </>:<div style={{fontSize:12,color:"var(--text3)"}}>No product column detected in CSV</div>}
    </div>
    <div style={CB}>
      <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14}}>🗃️ All RTO Orders ({total})</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <TH cols={Object.keys(rows[0]||{}).map(k=>k.replace(/_/g," ").toUpperCase())}/>
          <tbody>{rows.slice(0,50).map((row,i)=><tr key={i} style={ROW} {...HOV}>{Object.values(row).map((v,j)=><td key={j} style={{padding:"8px 12px",color:"var(--text2)",whiteSpace:"nowrap"}}>{v}</td>)}</tr>)}</tbody>
        </table>
        {rows.length>50&&<div style={{fontSize:11,color:"var(--text3)",padding:"10px 12px"}}>Showing 50 of {rows.length} rows</div>}
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════
// GOOGLE DASHBOARD
// ═══════════════════════════════════════════════
function GoogleDash({tab,gd,ct}){
  if(!gd?.summary?.spend)return <div style={{...CB,textAlign:"center",padding:"50px"}}>
    <div style={{fontSize:28,marginBottom:12}}>📊</div>
    <div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:6}}>No Google Ads data yet</div>
    <div style={{fontSize:12,color:"var(--text2)",maxWidth:420,margin:"0 auto",lineHeight:1.7}}>Add your Google Ads secrets to GitHub and run the workflow to see data here.</div>
  </div>;
  const g=gd.summary;
  if(tab==="G — Overview")return <div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      <div style={{width:20,height:20,borderRadius:5,background:"var(--google-red)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white"}}>G</div>
      <span style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>Google Ads — {gd.dateRange||""}</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
      <KPI label="Spend" value={rupee(g.spend)} sub={gd.dateRange} color="var(--google-red)"/>
      <KPI label="Revenue" value={rupee(g.revenue||0)} sub={"ROAS "+g.roas+"x"} color="var(--green)"/>
      <KPI label="CAC" value={rupee(g.cac)} sub={"Target ₹"+ct} warn={g.cac>ct}/>
      <KPI label="Conversions" value={fmt(g.conversions)} sub={"CTR "+(g.ctr*100).toFixed(2)+"%"} color="var(--yellow)"/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
      <KPI label="Impressions" value={fmtK(g.impressions)} color="var(--text2)"/>
      <KPI label="Clicks" value={fmtK(g.clicks)} color="var(--text2)"/>
      <KPI label="CPC" value={rupee(g.cpc)} color="var(--text2)"/>
      <KPI label="CPM" value={rupee(g.cpm)} color="var(--text2)"/>
    </div>
    <div style={CB}><div style={{fontSize:12,fontWeight:700,marginBottom:8,color:"var(--text)"}}>📈 Daily Spend & Conversions</div><LineChart data={gd.spendTrend||[]} yKey="spend" y2Key="conversions" yColor="#EA4335" y2Color="#0FD99C" y2Label="Conv"/></div>
  </div>;

  const tbl=(rows,cols,rowFn)=><div style={CB}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><TH cols={cols}/><tbody>{rows.map((r,i)=><tr key={i} style={ROW} {...HOV}>{rowFn(r)}</tr>)}</tbody></table></div></div>;
  const td=(v,opts={})=><td style={{padding:"9px 12px",color:opts.color||"var(--text2)",fontWeight:opts.bold?600:400,maxWidth:opts.max,overflow:opts.max?"hidden":undefined,textOverflow:opts.max?"ellipsis":undefined,whiteSpace:opts.max?"nowrap":undefined,...(opts.cap?{textTransform:"capitalize"}:{})}}>{v}</td>;

  if(tab==="G — Campaigns")return tbl(gd.campaigns||[],["Campaign","Status","Type","Spend","Revenue","ROAS","CAC","Conversions","CTR"],c=>[
    td(c.name,{bold:true,max:160}),<td key="s" style={{padding:"9px 12px"}}><Badge status={c.status}/></td>,
    td((c.type||"").replace(/_/g," "),{cap:true}),
    td(rupee(c.spend),{color:"var(--google-red)",bold:true}),td(rupee(c.revenue||0),{color:"var(--green)"}),
    <td key="r" style={{padding:"9px 12px"}}><ROAS roas={c.roas}/></td>,<td key="cac" style={{padding:"9px 12px"}}><CAC cac={c.cac} t={ct}/></td>,
    td(c.conversions||0),td(((c.ctr||0)*100).toFixed(2)+"%",{color:"var(--green)"}),
  ]);

  if(tab==="G — Ad Groups")return tbl(gd.adgroups||[],["Ad Group","Campaign","Spend","ROAS","CAC","Conversions","CTR"],a=>[
    td(a.name,{bold:true,max:160}),td(a.campaign,{max:120}),
    td(rupee(a.spend),{color:"var(--google-red)",bold:true}),
    <td key="r" style={{padding:"9px 12px"}}><ROAS roas={a.roas}/></td>,<td key="cac" style={{padding:"9px 12px"}}><CAC cac={a.cac} t={ct}/></td>,
    td(a.conversions||0),td(((a.ctr||0)*100).toFixed(2)+"%",{color:"var(--green)"}),
  ]);

  if(tab==="G — Keywords")return tbl(gd.keywords||[],["Search Term","Spend","Clicks","Conversions","Revenue","ROAS","CAC"],k=>[
    td(k.term,{bold:true,max:200}),td(rupee(k.spend),{color:"var(--google-red)",bold:true}),
    td(fmtK(k.clicks||0)),td(k.conversions||0),td(rupee(k.revenue||0),{color:"var(--green)"}),
    <td key="r" style={{padding:"9px 12px"}}><ROAS roas={k.roas}/></td>,<td key="cac" style={{padding:"9px 12px"}}><CAC cac={k.cac} t={ct}/></td>,
  ]);

  if(tab==="G — Devices")return tbl(gd.devices||[],["Device","Spend","Clicks","CTR","Conversions","Revenue","ROAS","CAC"],d=>[
    td(d.device,{bold:true}),td(rupee(d.spend),{color:"var(--google-red)",bold:true}),
    td(fmtK(d.clicks||0)),td((d.ctr||0)+"%",{color:"var(--green)"}),td(d.conversions||0),
    td(rupee(d.revenue||0),{color:"var(--green)"}),
    <td key="r" style={{padding:"9px 12px"}}><ROAS roas={d.roas}/></td>,<td key="cac" style={{padding:"9px 12px"}}><CAC cac={d.cac} t={ct}/></td>,
  ]);

  if(tab==="G — Geography")return tbl(gd.geography||[],["Region","Spend","Conversions","CAC","Revenue","ROAS","CTR"],g2=>[
    td(g2.region,{bold:true}),td(rupee(g2.spend),{color:"var(--google-red)",bold:true}),td(g2.conversions||0),
    <td key="cac" style={{padding:"9px 12px"}}><CAC cac={g2.cac} t={ct}/></td>,
    td(rupee(g2.revenue||0),{color:"var(--green)"}),
    <td key="r" style={{padding:"9px 12px"}}><ROAS roas={g2.roas}/></td>,td((g2.ctr||0)+"%",{color:"var(--green)"}),
  ]);
  return null;
}

// ═══════════════════════════════════════════════
// META DASHBOARD
// ═══════════════════════════════════════════════
function MetaDash({tab,data,ct,clientName,range}){
  const [fi,setFi]=useState({}),[aid,setAid]=useState(null);
  const s=data?.summary||{},p=data?.pacing||{};
  const analyse=async c=>{
    setAid(c.id);
    try{const f=c.funnel||{};const ins=await claude(`Meta Ads expert for Indian D2C "${clientName}". Specific advice in INR.\nCampaign: ${c.name} | Spend ₹${c.spend} | ROAS ${c.roas}x | CAC ₹${c.cac} (Target ₹${ct}) | Freq ${c.frequency} | ATC Abandon ${c.atc_abandon_rate}%\nFunnel: Reach ${f.reach}→Impr ${f.impressions}→Clicks ${f.link_clicks||f.clicks}→Landing ${f.landing_views}→Cart ${f.add_to_cart}→Purchases ${f.purchases}\n1. DIAGNOSIS (2-3 sentences) 2. TOP 3 NEXT STEPS with ₹ amounts 3. CAC IMPACT 4. VERDICT: SCALE🚀/OPTIMISE⚙️/FIX🔧/PAUSE⛔`);
    setFi(prev=>({...prev,[c.id]:ins}));}catch(e){setFi(prev=>({...prev,[c.id]:"Error: "+e.message}));}
    setAid(null);
  };
  const td=(v,opts={})=><td style={{padding:"9px 12px",color:opts.c||"var(--text2)",fontWeight:opts.b?600:400,maxWidth:opts.max,overflow:opts.max?"hidden":undefined,textOverflow:opts.max?"ellipsis":undefined,whiteSpace:opts.nowrap?"nowrap":undefined,textTransform:opts.cap?"capitalize":undefined}}>{v}</td>;

  if(tab==="Overview")return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
      <KPI label="Total Spend" value={rupee(s.spend)} sub={range} color="var(--indigo2)" hi/>
      <KPI label="Revenue (Shopify)" value={rupee(s.revenue||0)} sub={"ROAS "+s.roas+"x"} color="var(--green)"/>
      <KPI label="Cost / Acquisition" value={rupee(s.cac)} sub={"Target ₹"+ct+" · "+(s.cac>ct?((s.cac/ct-1)*100).toFixed(0)+"% above":"✓ On target")} warn={s.cac>ct}/>
      <KPI label="Purchases" value={fmt(s.conversions)} sub={s.ctr+"% CTR · "+fmtK(s.impressions)+" impr"} color="var(--yellow)"/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
      <KPI label="Add to Cart" value={fmtK(s.add_to_cart||0)} sub={(s.add_to_cart>0?((1-s.conversions/s.add_to_cart)*100).toFixed(0):0)+"% abandon"} color="var(--blue)"/>
      <KPI label="CPM" value={rupee(s.cpm)} sub={"Reach "+fmtK(s.reach)}/>
      <KPI label="Frequency" value={s.frequency||"—"} sub={s.frequency>=4?"⚠ Refresh creatives":s.frequency>=2.5?"Monitor closely":"Healthy"} warn={s.frequency>=4}/>
      <KPI label="Projected CAC" value={p.projected_cac>0?rupee(p.projected_cac):"—"} sub={(p.days_elapsed||0)+"d elapsed · "+(p.days_remaining||0)+"d left"} warn={p.projected_cac>ct}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:14,marginBottom:14}}>
      <div style={CB}><div style={{fontSize:12,fontWeight:700,marginBottom:8,color:"var(--text)"}}>📈 Spend & Purchases</div><LineChart data={data?.spendTrend||[]} yKey="spend" y2Key="purchases" yColor="#6366F1" y2Color="#0FD99C"/></div>
      <div style={CB}><div style={{fontSize:12,fontWeight:700,marginBottom:8,color:"var(--text)"}}>📉 CAC vs Target</div><LineChart data={(data?.spendTrend||[]).filter(d=>d.cac>0)} yKey="cac" yColor="#F5C842" goal={ct}/></div>
    </div>
    <div style={CB}><div style={{fontSize:12,fontWeight:700,marginBottom:10,color:"var(--text)"}}>⚡ Full Funnel</div>
      <Funnel f={{reach:s.reach,impressions:s.impressions,link_clicks:s.link_clicks||s.clicks||0,landing_views:s.landing_views||0,add_to_cart:s.add_to_cart||0,purchases:s.conversions,dropoffs:{impressions_to_link_clicks:s.impressions>0?+((((s.link_clicks||s.clicks||0)/s.impressions)*100).toFixed(2)):0,link_clicks_to_landing:(s.link_clicks||s.clicks)>0?+(((s.landing_views||0)/(s.link_clicks||s.clicks||1)*100).toFixed(1)):0,landing_to_cart:(s.landing_views||0)>0?+((s.add_to_cart||0)/(s.landing_views||1)*100).toFixed(1):0,cart_to_purchase:(s.add_to_cart||0)>0?+(s.conversions/(s.add_to_cart||1)*100).toFixed(1):0}}}/>
    </div>
  </div>;

  if(tab==="Campaigns")return <div style={CB}><div style={{fontSize:13,fontWeight:700,marginBottom:14,color:"var(--text)"}}>🎯 Campaigns — {range}</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><TH cols={["Campaign","Status","Spend","Revenue","ROAS","CAC","Purchases","ATC","Abandon%","Freq","CTR"]}/><tbody>{(data?.campaigns||[]).map(c=><tr key={c.id} style={ROW} {...HOV}>{[td(c.name,{b:true,max:160,nowrap:true}),<td key="s" style={{padding:"9px 12px"}}><Badge status={c.status}/></td>,td(rupee(c.spend),{c:"var(--indigo2)",b:true}),td(rupee(c.revenue||0),{c:"var(--green)"}),<td key="r" style={{padding:"9px 12px"}}><ROAS roas={c.roas}/></td>,<td key="cac" style={{padding:"9px 12px"}}><CAC cac={c.cac} t={ct}/></td>,td(c.purchases||0),td(c.atc||0),<td key="ab" style={{padding:"9px 12px",color:c.atc_abandon_rate>70?"var(--red)":"var(--yellow)",fontWeight:600}}>{c.atc_abandon_rate||0}%</td>,<td key="fr" style={{padding:"9px 12px"}}><Freq freq={c.frequency}/></td>,td((c.ctr||0)+"%",{c:"var(--green)"})]}</tr>)}</tbody></table></div></div>;

  if(tab==="Ad Sets")return <div style={CB}><div style={{fontSize:13,fontWeight:700,marginBottom:14,color:"var(--text)"}}>🎪 Ad Sets — {range}</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><TH cols={["Ad Set","Status","Budget/Day","Spend","Purchases","CAC","ATC","Abandon%","Freq","Age","Gender"]}/><tbody>{(data?.adsets||[]).map(a=><tr key={a.id} style={ROW} {...HOV}>{[td(a.name,{b:true,nowrap:true}),<td key="s" style={{padding:"9px 12px"}}><Badge status={a.status}/></td>,td(rupee(a.daily_budget)+"/d"),td(rupee(a.spend),{c:"var(--indigo2)",b:true}),td(a.purchases||0),<td key="cac" style={{padding:"9px 12px"}}><CAC cac={a.cac||0} t={ct}/></td>,td(a.atc||0),<td key="ab" style={{padding:"9px 12px",color:a.atc_abandon_rate>70?"var(--red)":"var(--yellow)",fontWeight:600}}>{a.atc_abandon_rate||0}%</td>,<td key="fr" style={{padding:"9px 12px"}}><Freq freq={a.frequency}/></td>,td(a.age),td(a.gender)]}</tr>)}</tbody></table></div></div>;

  if(tab==="Creatives")return <div style={CB}><div style={{fontSize:13,fontWeight:700,marginBottom:4,color:"var(--text)"}}>🎨 Creatives — {range}</div><div style={{fontSize:11,color:"var(--text2)",marginBottom:14}}>Freq ≥ 4 = fatigue 🔥 · CAC red = above ₹{ct}</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><TH cols={["Ad Name","Status","Spend","Revenue","ROAS","CAC","Purchases","CTR","Freq"]}/><tbody>{(data?.ads||[]).sort((a,b)=>b.spend-a.spend).map(a=><tr key={a.id} style={ROW} {...HOV}>{[td(a.name,{b:true,max:200,nowrap:true}),<td key="s" style={{padding:"9px 12px"}}><Badge status={a.status}/></td>,td(rupee(a.spend),{c:"var(--indigo2)",b:true}),td(rupee(a.revenue||0),{c:"var(--green)"}),<td key="r" style={{padding:"9px 12px"}}><ROAS roas={a.roas||0}/></td>,<td key="cac" style={{padding:"9px 12px"}}><CAC cac={a.cac} t={ct}/></td>,td(a.purchases||0),td((a.ctr||0)+"%",{c:"var(--green)"}),<td key="fr" style={{padding:"9px 12px"}}><Freq freq={a.frequency}/></td>]}</tr>)}</tbody></table></div></div>;

  if(tab==="Funnels")return <div><div style={{...CB,marginBottom:12}}><div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:3}}>📊 Campaign Funnels — {range}</div><div style={{fontSize:11,color:"var(--text2)"}}>ATC abandon &gt;70% is red · Freq 🔥 = fatigue · Click ✨ AI Analyse for specific steps</div></div>
    {(data?.campaigns||[]).map(c=><div key={c.id} style={{...CB,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div><div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{c.name}</div>
          <div style={{fontSize:11,color:"var(--text2)",marginTop:3,display:"flex",gap:10,flexWrap:"wrap"}}>
            <span>CAC <CAC cac={c.cac} t={ct}/></span><span>ROAS <ROAS roas={c.roas}/></span>
            <span style={{color:"var(--indigo2)"}}>Spend {rupee(c.spend)}</span><span>Freq <Freq freq={c.frequency}/></span>
            {c.atc>0&&<span style={{color:c.atc_abandon_rate>70?"var(--red)":"var(--yellow)"}}>ATC {c.atc_abandon_rate}% abandon</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <Badge status={c.status}/>
          <button onClick={()=>analyse(c)} disabled={aid===c.id} style={{fontSize:11,padding:"5px 12px",cursor:"pointer",borderRadius:8,background:"rgba(99,102,241,0.12)",color:"var(--indigo2)",border:"1px solid rgba(99,102,241,0.22)",fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
            {aid===c.id?<><Spin s={10} c="var(--indigo2)"/>Analysing</>:"✨ AI Analyse"}
          </button>
        </div>
      </div>
      <Funnel f={c.funnel||{}}/>
      {fi[c.id]&&<div style={{marginTop:12,background:"rgba(99,102,241,0.07)",border:"1px solid rgba(99,102,241,0.18)",borderRadius:10,padding:"12px 14px",animation:"fadeIn 0.4s ease"}}>
        <div style={{fontSize:10,fontWeight:700,color:"var(--indigo2)",marginBottom:6,letterSpacing:"0.05em"}}>✨ AI ANALYSIS</div>
        <div style={{fontSize:12,color:"#CBD5E1",lineHeight:1.85,whiteSpace:"pre-wrap",fontFamily:"'DM Mono',monospace"}}>{fi[c.id]}</div>
      </div>}
    </div>)}
  </div>;

  if(tab==="Audiences")return <div><div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:14}}>
    <div style={CB}><div style={{fontSize:13,fontWeight:700,marginBottom:14,color:"var(--text)"}}>👥 Age Performance</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><TH cols={["Age Group","Spend","Purchases","CAC","ROAS","Avg Freq"]}/><tbody>{(data?.audienceAge||[]).map(a=><tr key={a.group} style={ROW} {...HOV}>{[td(a.group,{b:true}),td(rupee(a.spend||0),{c:"var(--indigo2)"}),td(a.purchases||0),<td key="cac" style={{padding:"8px 12px"}}><CAC cac={a.cac||0} t={ct}/></td>,<td key="r" style={{padding:"8px 12px"}}><ROAS roas={a.roas||0}/></td>,<td key="fr" style={{padding:"8px 12px"}}><Freq freq={a.avg_frequency||0}/></td>]}</tr>)}</tbody></table></div></div>
    <div style={CB}><div style={{fontSize:13,fontWeight:700,marginBottom:14,color:"var(--text)"}}>⚖️ Gender Split</div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,paddingTop:20}}>
        <div style={{width:110,height:110}}><svg viewBox="0 0 36 36" style={{width:"100%",height:"100%",transform:"rotate(-90deg)"}}>
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(99,102,241,0.9)" strokeWidth="3.5" strokeDasharray={`${data?.audienceGender?.male||0} ${100-(data?.audienceGender?.male||0)}`}/>
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(244,114,182,0.8)" strokeWidth="3.5" strokeDasharray={`${data?.audienceGender?.female||0} ${100-(data?.audienceGender?.female||0)}`} strokeDashoffset={`-${data?.audienceGender?.male||0}`}/>
        </svg></div>
        <div style={{display:"flex",gap:28}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"var(--indigo2)"}}>{data?.audienceGender?.male||0}%</div><div style={{fontSize:11,color:"var(--text2)"}}>Male</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"var(--pink)"}}>{data?.audienceGender?.female||0}%</div><div style={{fontSize:11,color:"var(--text2)"}}>Female</div></div>
        </div>
      </div>
    </div>
  </div></div>;

  if(tab==="Placements")return <div style={CB}><div style={{fontSize:13,fontWeight:700,marginBottom:4,color:"var(--text)"}}>📱 Placements</div><div style={{fontSize:11,color:"var(--text2)",marginBottom:14}}>Scale low CAC · Cut above ₹{ct}</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><TH cols={["Platform","Position","Spend","Purchases","CAC","ROAS","CTR"]}/><tbody>{(data?.placements||[]).map((p2,i)=><tr key={i} style={ROW} {...HOV}>{[td(p2.platform,{b:true,cap:true}),td((p2.position||"").replace(/_/g," "),{cap:true}),td(rupee(p2.spend),{c:"var(--indigo2)",b:true}),td(p2.purchases||0),<td key="cac" style={{padding:"9px 12px"}}><CAC cac={p2.cac||0} t={ct}/></td>,<td key="r" style={{padding:"9px 12px"}}><ROAS roas={p2.roas||0}/></td>,td((p2.ctr||0)+"%",{c:"var(--green)"})]}</tr>)}</tbody></table></div></div>;

  if(tab==="Geography")return <div style={CB}><div style={{fontSize:13,fontWeight:700,marginBottom:14,color:"var(--text)"}}>🗺️ Geography — {range}</div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><TH cols={["Region","Spend","Purchases","CAC","ROAS","Source","CTR"]}/><tbody>{(data?.geography||[]).map((g,i)=><tr key={i} style={ROW} {...HOV}>{[td(g.region,{b:true}),td(rupee(g.spend),{c:"var(--indigo2)",b:true}),td(g.purchases||0),<td key="cac" style={{padding:"9px 12px"}}><CAC cac={g.cac||0} t={ct}/></td>,<td key="r" style={{padding:"9px 12px"}}><ROAS roas={g.roas||0}/></td>,<td key="src" style={{padding:"9px 12px"}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:g.revenue_source==="shopify"?"rgba(15,217,156,0.1)":"rgba(99,102,241,0.1)",color:g.revenue_source==="shopify"?"var(--green)":"var(--indigo2)",fontWeight:600}}>{g.revenue_source||"meta"}</span></td>,td((g.ctr||0)+"%",{c:"var(--green)"})]}</tr>)}</tbody></table></div></div>;

  if(tab==="Heatmap")return <div style={CB}><div style={{fontSize:13,fontWeight:700,marginBottom:4,color:"var(--text)"}}>🕐 Time-of-Day Heatmap</div><div style={{fontSize:11,color:"var(--text2)",marginBottom:16}}>Darker = more spend · Green = purchases · Best hours to run ads</div><Heatmap data={data?.hours||[]}/></div>;

  if(tab==="Pacing")return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
      <KPI label="Spent to Date" value={rupee(p.spend_to_date||0)} sub={(p.days_elapsed||0)+" of 30 days"} color="var(--indigo2)"/>
      <KPI label="Daily Average" value={rupee(p.daily_avg||0)} sub="Avg per day"/>
      <KPI label="Projected Spend" value={rupee(p.projected_month||0)} sub="Month end" color="var(--yellow)"/>
      <KPI label="Projected CAC" value={p.projected_cac>0?rupee(p.projected_cac):"—"} sub={"Target ₹"+ct} warn={(p.projected_cac||0)>ct}/>
    </div>
    <div style={CB}><div style={{fontSize:13,fontWeight:700,marginBottom:14,color:"var(--text)"}}>📅 Daily Pacing</div><LineChart data={data?.spendTrend||[]} yKey="spend" y2Key="cac" yColor="#6366F1" y2Color="#F5C842" y2Label="CAC" goal={ct}/>
      <div style={{marginTop:12,fontSize:12,color:"var(--text2)"}}>{(p.projected_cac||0)>ct?<span style={{color:"var(--red)"}}>⚠ Projected CAC ₹{fmt(p.projected_cac)} is {((p.projected_cac/ct-1)*100).toFixed(0)}% above ₹{ct} target.</span>:<span style={{color:"var(--green)"}}>✓ On track to hit ₹{ct} CAC target.</span>}</div>
    </div>
  </div>;
  return null;
}

// ═══════════════════════════════════════════════
// AI STRATEGY TAB
// ═══════════════════════════════════════════════
function AITab({md,gd,client}){
  const [budget,setBudget]=useState(100000),[ai,setAi]=useState(""),[loading,setLoading]=useState(false);
  const s=md?.summary||{},g=gd?.summary||{},hasG=!!(g.spend>0);
  const gen=async()=>{
    setLoading(true);setAi("");
    try{setAi(await claude(`Senior performance marketer for "${client.name}" (Indian D2C, Carousel Media agency). Strategy to hit CAC ₹${client.cacTarget}.\n\nBUDGET: ₹${budget}\n\nMETA: Spend ₹${s.spend} | Revenue ₹${s.revenue||0} | ROAS ${s.roas}x | CAC ₹${s.cac} (Target ₹${client.cacTarget})\nPurchases ${s.conversions} | CTR ${s.ctr}% | Freq ${s.frequency} | ATC ${s.add_to_cart} | ATC Abandon ${s.add_to_cart>0?((1-s.conversions/s.add_to_cart)*100).toFixed(1):0}%\n${hasG?`GOOGLE: Spend ₹${g.spend} | Revenue ₹${g.revenue||0} | ROAS ${g.roas}x | CAC ₹${g.cac} | Conv ${g.conversions}`:"Google: Not connected"}\n\nTOP META CAMPAIGNS:\n${(md?.campaigns||[]).slice(0,5).map(c=>`${c.name}: ₹${c.spend}, ROAS ${c.roas}x, CAC ₹${c.cac}`).join("\n")}\n\nTOP GEOS:\n${(md?.geography||[]).slice(0,5).map(g2=>`${g2.region}: ₹${g2.spend}, CAC ₹${g2.cac}`).join("\n")}\n\nProvide:\n## BUDGET SPLIT${hasG?" (Meta vs Google)":""}\n## CAC GAP ANALYSIS ₹${Math.max(s.cac,g.cac||0)} → ₹${client.cacTarget}\n## CREATIVE STRATEGY\n## TOP AUDIENCES & GEOS\n## ATC RECOVERY PLAN\n## 30-DAY WEEK-BY-WEEK PLAN\n\nAll amounts in ₹. Indian D2C context, account for RTO risks.`));}
    catch(e){setAi("Error: "+e.message);}
    setLoading(false);
  };
  return <div>
    <div style={CB}><div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:10}}>✨ AI Strategy — {client.name}</div>
      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{flex:"0 0 auto"}}><div style={{fontSize:10,color:"var(--text3)",marginBottom:4}}>TOTAL BUDGET (₹)</div><input type="number" value={budget} onChange={e=>setBudget(Number(e.target.value))} style={{width:160}}/></div>
        <div style={{paddingTop:20}}><button onClick={gen} disabled={loading} style={{padding:"8px 20px",fontSize:12,cursor:loading?"wait":"pointer",borderRadius:8,background:"linear-gradient(135deg,var(--accent),#FF4060)",color:"white",border:"none",fontWeight:700,display:"flex",alignItems:"center",gap:8,whiteSpace:"nowrap"}}>{loading?<><Spin s={12} c="white"/>Generating...</>:"✨ Generate Strategy"}</button></div>
        <div style={{paddingTop:20,fontSize:11,color:"var(--text2)"}}>Meta CAC <span style={{color:s.cac>client.cacTarget?"var(--red)":"var(--green)",fontWeight:700}}>₹{fmt(s.cac)}</span>{hasG&&<> · Google CAC <span style={{color:g.cac>client.cacTarget?"var(--red)":"var(--green)",fontWeight:700}}>₹{fmt(g.cac)}</span></>} · Target <span style={{color:"var(--yellow)",fontWeight:700}}>₹{client.cacTarget}</span></div>
      </div>
    </div>
    {loading&&<div style={{...CB,textAlign:"center",padding:"50px"}}><Spin s={28}/><div style={{fontSize:12,color:"var(--text2)",marginTop:14}}>Analysing all data for {client.name}...</div></div>}
    {ai&&!loading&&<div style={{...CB,background:"rgba(255,107,53,0.04)",border:"1px solid rgba(255,107,53,0.18)",animation:"fadeIn 0.4s ease"}}><div style={{fontSize:10,fontWeight:700,color:"var(--accent)",marginBottom:10,letterSpacing:"0.08em"}}>✨ STRATEGY — ₹{fmt(budget)}</div><div style={{fontSize:12,color:"#CBD5E1",lineHeight:1.9,whiteSpace:"pre-wrap",fontFamily:"'DM Mono',monospace"}}>{ai}</div></div>}
    {!ai&&!loading&&<div style={{...CB,textAlign:"center",padding:"50px"}}><div style={{fontSize:32,marginBottom:12}}>✨</div><div style={{fontSize:15,fontWeight:700,color:"var(--text)",marginBottom:6}}>Ready to build your strategy</div><div style={{fontSize:12,color:"var(--text2)",maxWidth:440,margin:"0 auto",lineHeight:1.7}}>Enter budget and click Generate. AI will analyse Meta{hasG?" + Google":""} data and build a week-by-week plan to hit ₹{client.cacTarget} CAC.</div></div>}
  </div>;
}

// ═══════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════
function Login({onLogin}){
  const [u,setU]=useState(""),[p,setP]=useState(""),[err,setErr]=useState(""),[loading,setLoading]=useState(false);
  const submit=()=>{setLoading(true);setErr("");setTimeout(()=>{const found=USERS.find(x=>x.username===u&&x.password===p);if(found)onLogin(found);else{setErr("Invalid username or password");setLoading(false);}},400);};
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:20}}>
    <div style={{width:"100%",maxWidth:380,animation:"fadeIn 0.4s ease"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,var(--accent),#FF4060)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px"}}>🎠</div>
        <div style={{fontSize:22,fontWeight:700,color:"var(--text)",letterSpacing:"-0.02em"}}>Carousel Media</div>
        <div style={{fontSize:13,color:"var(--text2)",marginTop:4}}>Performance Dashboard</div>
      </div>
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid var(--border2)",borderRadius:16,padding:"28px 24px"}}>
        <div style={{marginBottom:16}}><div style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginBottom:6,letterSpacing:"0.06em",textTransform:"uppercase"}}>Username</div><input type="text" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Enter username" autoFocus/></div>
        <div style={{marginBottom:20}}><div style={{fontSize:11,fontWeight:600,color:"var(--text3)",marginBottom:6,letterSpacing:"0.06em",textTransform:"uppercase"}}>Password</div><input type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Enter password"/></div>
        {err&&<div style={{fontSize:12,color:"var(--red)",marginBottom:14,padding:"8px 12px",background:"rgba(255,64,96,0.08)",borderRadius:8}}>{err}</div>}
        <button onClick={submit} disabled={loading||!u||!p} style={{width:"100%",padding:"10px",fontSize:13,fontWeight:700,cursor:loading||!u||!p?"not-allowed":"pointer",borderRadius:10,background:loading||!u||!p?"rgba(255,107,53,0.3)":"linear-gradient(135deg,var(--accent),#FF4060)",color:"white",border:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {loading?<><Spin s={14} c="white"/>Signing in...</>:"Sign In →"}
        </button>
      </div>
      <div style={{textAlign:"center",fontSize:11,color:"var(--text3)",marginTop:20}}>© 2025 Carousel Media</div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);
  const [client,setClient]=useState(null);
  const [tab,setTab]=useState("Overview");
  const [range,setRange]=useState("last_28d");
  const [md,setMd]=useState(null); // meta data
  const [gd,setGd]=useState(null); // google data
  const [loading,setLoading]=useState(false);
  const [gLoading,setGLoading]=useState(false);
  const [err,setErr]=useState(null);
  const [search,setSearch]=useState("");

  const visible=useMemo(()=>{
    if(!user)return[];
    const all=user.role==="agency"?CLIENTS:CLIENTS.filter(c=>c.id===user.clientId);
    return all.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  },[user,search]);

  const onLogin=u=>{
    setUser(u);
    const all=u.role==="agency"?CLIENTS:CLIENTS.filter(c=>c.id===u.clientId);
    if(all.length)setClient(all[0]);
  };

  const load=useCallback(async(r,c)=>{
    const rng=r||range,cl=c||client;
    if(!cl)return;
    const fk=DATE_RANGES.find(d=>d.value===rng)?.fileKey||"d28";
    setLoading(true);setErr(null);setMd(null);setGd(null);
    try{const res=await fetch(cl.metaFiles[fk]+"?t="+Date.now());if(!res.ok)throw new Error(`Could not load data for ${cl.name}. Run the GitHub Action first.`);setMd(await res.json());}
    catch(e){setErr(e.message);}
    setLoading(false);
    if(cl.platforms.includes("google")&&cl.googleFiles){
      setGLoading(true);
      try{const gr=await fetch(cl.googleFiles[fk]+"?t="+Date.now());if(gr.ok){const gdata=await gr.json();setGd(gdata?.summary?gdata:null);}}
      catch(e){console.log("Google data not available");}
      setGLoading(false);
    }
  },[range,client]);

  const switchClient=async c=>{setClient(c);setTab("Overview");setMd(null);setGd(null);await load(range,c);};
  useEffect(()=>{if(client)load();},[client]);

  if(!user)return <Login onLogin={onLogin}/>;

  const allTabs=[...META_TABS,...(client?.platforms?.includes("google")?GOOGLE_TABS:[]),...EXTRA_TABS];
  const rangeLabel=DATE_RANGES.find(r=>r.value===range)?.label||"";
  const isG=tab.startsWith("G — "),isRTO=tab==="RTO Analysis",isAI=tab==="✨ AI Strategy";

  return <div style={{display:"flex",minHeight:"100vh",background:"var(--bg)"}}>
    {/* SIDEBAR */}
    <div style={{width:"var(--sidebar)",background:"var(--surface)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",flexShrink:0,minHeight:"100vh"}}>
      <div style={{padding:"18px 14px 14px",borderBottom:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,var(--accent),#FF4060)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🎠</div>
          <div><div style={{fontSize:12,fontWeight:700,color:"var(--text)"}}>Carousel Media</div><div style={{fontSize:9,color:"var(--text3)",marginTop:1}}>{user.role==="agency"?"Agency View":"Client View"}</div></div>
        </div>
      </div>
      {user.role==="agency"&&CLIENTS.length>5&&<div style={{padding:"10px 10px 0"}}><input type="text" placeholder="Search clients..." value={search} onChange={e=>setSearch(e.target.value)} style={{fontSize:11,padding:"6px 10px"}}/></div>}
      <div style={{flex:1,overflowY:"auto",padding:"10px 8px"}}>
        {user.role==="agency"&&<div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:"var(--text3)",textTransform:"uppercase",padding:"0 6px 8px"}}>CLIENTS ({visible.length})</div>}
        {visible.map(c=>{const active=c.id===client?.id;return(
          <button key={c.id} onClick={()=>switchClient(c)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 8px",borderRadius:8,background:active?"rgba(255,107,53,0.1)":"transparent",border:active?"1px solid rgba(255,107,53,0.22)":"1px solid transparent",cursor:"pointer",marginBottom:2,textAlign:"left",transition:"all 0.15s"}}>
            <div style={{width:28,height:28,borderRadius:7,background:`linear-gradient(135deg,${c.color},${c.color}80)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"white",flexShrink:0}}>{c.initials}</div>
            <div style={{overflow:"hidden",flex:1}}>
              <div style={{fontSize:11,fontWeight:600,color:active?"var(--accent)":"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
              <div style={{fontSize:9,color:"var(--text3)",display:"flex",gap:3,marginTop:1,flexWrap:"wrap"}}>{c.platforms.map(p=><span key={p} style={{padding:"0 3px",background:"rgba(255,255,255,0.06)",borderRadius:3,textTransform:"uppercase",letterSpacing:"0.04em"}}>{p}</span>)}</div>
            </div>
            {active&&<div style={{width:5,height:5,borderRadius:"50%",background:"var(--accent)",flexShrink:0}}/>}
          </button>
        );})}
      </div>
      <div style={{padding:"10px 12px",borderTop:"1px solid var(--border)"}}>
        <div style={{fontSize:11,color:"var(--text2)",marginBottom:6}}>{user.username}</div>
        <button onClick={()=>{setUser(null);setClient(null);setMd(null);setGd(null);}} style={{fontSize:10,padding:"4px 10px",cursor:"pointer",borderRadius:6,background:"rgba(255,64,96,0.08)",color:"var(--red)",border:"1px solid rgba(255,64,96,0.15)",fontWeight:600,width:"100%"}}>Sign Out</button>
      </div>
    </div>

    {/* MAIN */}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Top bar */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"9px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {client&&<div style={{width:7,height:7,borderRadius:"50%",background:md?"var(--green)":"var(--text3)",animation:!md?"pulse 1.5s infinite":undefined}}/>}
          <span style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>{client?.name||"Select a client"}</span>
          {md&&<span style={{fontSize:10,color:"var(--text3)"}}>Updated {md.lastUpdated}</span>}
          {md?.shopify_connected&&<span style={{fontSize:10,padding:"2px 7px",background:"rgba(15,217,156,0.1)",color:"var(--green)",borderRadius:20,fontWeight:600}}>🛒 Shopify</span>}
          {gLoading&&<span style={{fontSize:10,color:"var(--text3)",display:"flex",alignItems:"center",gap:5}}><Spin s={11}/>Loading Google...</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:7,border:"1px solid var(--border)",overflow:"hidden"}}>
            {DATE_RANGES.map(r=><button key={r.value} onClick={async()=>{setRange(r.value);setTab("Overview");await load(r.value);}} style={{padding:"5px 11px",fontSize:11,fontWeight:600,border:"none",cursor:"pointer",background:range===r.value?"rgba(255,107,53,0.18)":"transparent",color:range===r.value?"var(--accent)":"var(--text2)",borderRight:"1px solid var(--border)",transition:"all 0.15s"}}>{r.label}</button>)}
          </div>
          {loading&&<Spin s={13}/>}
          <button onClick={()=>load()} style={{fontSize:11,padding:"5px 10px",cursor:"pointer",borderRadius:7,background:"rgba(255,107,53,0.08)",color:"var(--accent)",border:"1px solid rgba(255,107,53,0.18)",fontWeight:600}}>↻</button>
        </div>
      </div>
      {/* Tabs */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"0 18px",display:"flex",gap:0,overflowX:"auto",flexShrink:0}}>
        {allTabs.map(t=>{const isGT=t.startsWith("G — ");return <button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",cursor:"pointer",padding:"9px 11px",fontSize:11,fontWeight:600,whiteSpace:"nowrap",color:tab===t?isGT?"var(--google-red)":"var(--accent)":"var(--text3)",borderBottom:tab===t?`2px solid ${isGT?"var(--google-red)":"var(--accent)"}`:"2px solid transparent",transition:"all 0.15s"}}>{t}</button>;})}
      </div>
      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"18px"}}>
        {loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:14}}><Spin s={28}/><div style={{fontSize:13,color:"var(--text3)"}}>Loading {client?.name}...</div></div>}
        {err&&!loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:12,textAlign:"center",padding:"0 40px"}}>
          <div style={{fontSize:24}}>⚠️</div><div style={{fontSize:14,fontWeight:600,color:"var(--red)"}}>Failed to load data</div>
          <div style={{fontSize:12,color:"var(--text2)",maxWidth:480,lineHeight:1.7}}>{err}</div>
          <button onClick={()=>load()} style={{padding:"8px 20px",fontSize:12,cursor:"pointer",borderRadius:8,background:"var(--accent)",color:"white",border:"none",fontWeight:600}}>Retry</button>
        </div>}
        {(md||isRTO)&&!loading&&<div style={{animation:"fadeIn 0.3s ease"}}>
          {isRTO&&<RTOTab clientName={client?.name||""}/>}
          {isAI&&<AITab md={md} gd={gd} client={client}/>}
          {isG&&<GoogleDash tab={tab} gd={gd} ct={client?.cacTarget||250}/>}
          {!isRTO&&!isAI&&!isG&&md&&<MetaDash tab={tab} data={md} ct={client?.cacTarget||250} clientName={client?.name||""} range={rangeLabel}/>}
        </div>}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
