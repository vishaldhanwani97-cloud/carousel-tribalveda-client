name: Fetch Ads Data Daily — Carousel Media

on:
  schedule:
    - cron: '0 1 * * *'   # 1 AM UTC = 6:30 AM IST
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Fetch Meta Ads data ───────────────────────────────────────
      - name: Fetch Meta Ads data
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID:   ${{ secrets.META_AD_ACCOUNT_ID }}
          SHOPIFY_ADMIN_TOKEN:  ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          SHOPIFY_STORE_URL:    ${{ secrets.SHOPIFY_STORE_URL }}
        run: |
          echo "Running Meta Ads fetch..."
          python fetch_ads.py
        continue-on-error: true   # Don't fail whole job if Meta fails

      # ── Fetch Google Ads data ─────────────────────────────────────
      - name: Fetch Google Ads data
        env:
          GOOGLE_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_DEVELOPER_TOKEN }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CUSTOMER_ID:     ${{ secrets.GOOGLE_CUSTOMER_ID }}
        run: |
          echo "Running Google Ads fetch..."
          python fetch_google.py
        continue-on-error: true   # Don't fail whole job if Google not configured

      # ── Commit and push all updated data files ────────────────────
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_7d.json data_28d.json data_month.json data.json \
                  google_7d.json google_28d.json google_month.json \
                  2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        continue-on-error: true

      # ── Print summary ─────────────────────────────────────────────
      - name: Summary
        run: |
          echo "=== Fetch Summary ==="
          for f in data_28d.json google_28d.json; do
            if [ -f "$f" ]; then
              echo "✓ $f — $(python3 -c "import json; d=json.load(open('$f')); print(f\"{len(d.get('campaigns',[]))} campaigns\")")"
            else
              echo "✗ $f — not generated"
            fi
          done
